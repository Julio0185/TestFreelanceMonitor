<section id="servicios" class="py-24 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <span class="text-sm font-semibold text-accent uppercase tracking-wider">Lo que hacemos</span>
      <h2 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mt-3 mb-4">Nuestros Servicios</h2>
      <p class="text-slate-400 max-w-2xl mx-auto text-lg">
        Ofrecemos soluciones integrales para llevar tu negocio al siguiente nivel digital.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (service of services; track service.title) {
        <div class="group relative p-6 rounded-2xl bg-surface-card border border-white/5 hover:border-primary/30 transition-all duration-300 hover:-translate-y-1">
          <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="relative">
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center mb-4 group-hover:bg-primary/20 transition-colors">
              <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="service.icon" />
              </svg>
            </div>
            <h3 class="text-xl font-semibold text-white mb-2">{{ service.title }}</h3>
            <p class="text-slate-400 leading-relaxed">{{ service.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
